# Nginx config for lladlad VPS deployment
# Install: sudo cp deploy/nginx/lladlad.conf /etc/nginx/sites-available/lladlad
#          sudo ln -sf /etc/nginx/sites-available/lladlad /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx

# API + uploads (required)
server {
    listen 80;
    server_name api.yourdomain.com;

    client_max_body_size 12M;

    location /uploads/ {
        alias /var/lib/lladlad/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# Frontend on same VPS (optional — skip if using Cloudflare Pages)
server {
    listen 80;
    server_name www.yourdomain.com yourdomain.com;

    root /var/www/lladlad;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
