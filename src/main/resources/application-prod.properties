# Production profile — Docker / VPS (MySQL in compose network)

server.port=${PORT:8080}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

file.upload-dir=${FILE_UPLOAD_DIR:/app/uploads}

jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
app.site.url=${SITE_URL}

razorpay.key-id=${RAZORPAY_KEY_ID:}
razorpay.key-secret=${RAZORPAY_KEY_SECRET:}

spring.cache.type=caffeine
spring.cache.cache-names=categories,subcategories,users,posts,userProfiles
spring.cache.caffeine.spec=maximumSize=500,expireAfterWrite=30m,expireAfterAccess=10m

rate.limit.get.capacity=60
rate.limit.get.refill-tokens=60
rate.limit.get.refill-period-ms=1000
rate.limit.write.capacity=20
rate.limit.write.refill-tokens=20
rate.limit.write.refill-period-ms=1000
